<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerLogicLess - Minhas Experiências Roblox</title>
    <style>
        body { 
            font-family: sans-serif; 
            /* Aqui está a mágica: */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('logiclesswebsitebackground.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
        }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #00A2FF; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .game-card { 
            background: rgba(30, 30, 30, 0.85); /* Um pouco transparente para aparecer o fundo */
            border-radius: 10px; 
            padding: 20px; 
            margin: 20px 0; 
            border: 1px solid #444; 
            backdrop-filter: blur(5px); /* Efeito de vidro fosco */
        }
        a { color: #00A2FF; text-decoration: none; font-weight: bold; }
        .btn { background: #00A2FF; color: white; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ServerLogicLess</h1>
        <p>Bem-vindo à minha comunidade de experiências no Roblox!</p>
        
        <div class="game-card">
            <h2>Nome do Seu Jogo 1</h2>

            <a href="LINK_DO_SEU_JOGO_AQUI" class="btn">Jogar no Roblox</a>
        </div>

        <div class="game-card">
            <h2>Nome do Seu Jogo 2</h2>

    </div>
