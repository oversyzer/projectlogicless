<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerLogicLess - Studio</title>
    <style>
        /* Estilos Gerais */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('logiclesswebsitebackground.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            margin: 0;
            padding-top: 80px; /* Espaço para o header fixo não cobrir o conteúdo */
        }

        /* Cabeçalho Fixo (Estilo Small World Games) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid #00FFCC; /* Linha neon fina igual da foto */
        }

        .logo { font-weight: bold; font-size: 20px; letter-spacing: 1px; }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: #00FFCC; }

        /* Seção "Our Games" */
        .container { max-width: 1100px; margin: auto; padding: 40px 20px; text-align: center; }
        
        .stats { color: #00FFCC; font-size: 24px; font-weight: bold; margin-bottom: 40px; }
        .stats span { color: white; display: block; font-size: 16px; margin-top: 5px; }

        .games-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Card estilo a imagem que você mandou */
        .game-card {
            background: #1a1a1a;
            width: 300px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
            text-align: left;
        }

        .game-card:hover { transform: translateY(-10px); border-color: #00FFCC; }

        .game-thumb {
            width: 100%;
            height: 170px;
            background: #333; /* Placeholder para imagem */
            background-size: cover;
        }

        .game-info { padding: 15px; }
        .game-info h3 { margin: 0 0 10px 0; font-size: 18px; }
        .game-info p { font-size: 13px; color: #ccc; margin: 5px 0; }

        .tag {
            background: #00FFCC;
            color: black;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SERVERLOGICLESS</div>
        <nav>
            <a href="#">About</a>
            <a href="#">Games</a>
            <a href="#">Brands</a>
            <a href="#">Join</a>
        </nav>
    </header>

    <div class="container">
        <h1>OUR GAMES</h1>
        <div class="stats">
            2 Billion+ <span>Total Visits</span>
            30 Million+ <span>Monthly Players</span>
        </div>

        <div class="games-grid">
            <div class="game-card">
                <div class="game-thumb" style="background-image: url('foto_do_jogo1.jpg');"></div>
                <div class="game-info">
                    <span class="tag">#1 on Roblox!</span>
                    <h3>Anime Defenders</h3>
                    <p>👁️ 740M+ Visits</p>
                    <p>👍 97% Approval</p>
                </div>
            </div>

            <div class="game-card">
                <div class="game-thumb" style="background-image: url('foto_do_jogo2.jpg');"></div>
                <div class="game-info">
                    <span class="tag">Action PvP</span>
                    <h3>Death Ball</h3>
                    <p>👁️ 579M+ Visits</p>
                    <p>👍 96% Approval</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
